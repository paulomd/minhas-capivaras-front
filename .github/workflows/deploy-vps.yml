# Deploy automático na VPS via SSH (após publicar imagem no GHCR).
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, GHCR_TOKEN
# Variables: APP_PUBLIC_URL, API_URL | opcional: VPS_SSH_PORT, VPS_DEPLOY_PATH, FRONTEND_PORT, BACKEND_PORT
name: Deploy VPS

on:
  workflow_run:
    workflows: ["Publish Docker image"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-vps-frontend
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Preparar host e porta SSH
        id: ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ vars.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          HOST="${VPS_HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"
          PORT="${VPS_SSH_PORT:-22}"
          if [[ -z "$HOST" ]]; then
            echo "::error::Secret VPS_HOST vazio. Use só o IP (ex. 82.25.69.207), sem http://."
            exit 1
          fi
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "port=${PORT}" >> "$GITHUB_OUTPUT"

      - name: URLs públicas
        id: urls
        run: |
          APP="${{ vars.APP_PUBLIC_URL }}"
          APP="${APP%/}"
          if [[ -z "$APP" || "$APP" == "http://localhost" ]]; then
            echo "::error::Defina a variable APP_PUBLIC_URL (IP/domínio da VPS)."
            exit 1
          fi
          scheme="${APP%%://*}"
          rest="${APP#*://}"
          host="${rest%%/*}"
          API="${{ vars.API_URL }}"
          if [[ -z "$API" ]]; then
            BACKEND_PORT="${{ vars.BACKEND_PORT }}"
            BACKEND_PORT="${BACKEND_PORT:-8090}"
            API="${scheme}://${host}:${BACKEND_PORT}"
          fi
          echo "app_public_url=${APP}" >> "$GITHUB_OUTPUT"
          echo "api_url=${API}" >> "$GITHUB_OUTPUT"

      - name: Testar conectividade SSH
        env:
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if timeout 15 bash -c "echo >/dev/tcp/${SSH_HOST}/${SSH_PORT}" 2>/dev/null; then
              echo "Porta ${SSH_PORT} acessível (tentativa ${attempt})."
              exit 0
            fi
            echo "Tentativa ${attempt}/3: timeout em ${SSH_PORT}."
            sleep 15
          done
          echo "::error::SSH inacessível do GitHub Actions (porta ${SSH_PORT})."
          exit 1

      - name: Enviar arquivos de deploy
        uses: appleboy/scp-action@v1
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh.outputs.port }}
          timeout: 120s
          command_timeout: 15m
          source: "deploy/docker-compose.yml,deploy/deploy.sh"
          target: ${{ vars.VPS_DEPLOY_PATH || '/opt/minhas-capivaras/frontend' }}
          strip_components: 1
          overwrite: true

      - name: Executar deploy na VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_URL: ${{ steps.urls.outputs.app_public_url }}
          API_URL: ${{ steps.urls.outputs.api_url }}
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          DEPLOY_DIR: ${{ vars.VPS_DEPLOY_PATH || '/opt/minhas-capivaras/frontend' }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh.outputs.port }}
          timeout: 120s
          command_timeout: 30m
          envs: APP_URL,API_URL,GHCR_IMAGE,GHCR_TOKEN,GHCR_USER,DEPLOY_DIR,FRONTEND_PORT,BACKEND_PORT
          script: |
            set -euo pipefail
            cd "$DEPLOY_DIR"
            chmod +x deploy.sh
            REGISTRY="${GHCR_IMAGE,,}"
            FE_PORT="${FRONTEND_PORT:-3000}"
            BE_PORT="${BACKEND_PORT:-8090}"
            {
              echo "GHCR_IMAGE=${REGISTRY}"
              echo "IMAGE_TAG=latest"
              echo "FRONTEND_PORT=${FE_PORT}"
              echo "BACKEND_PORT=${BE_PORT}"
              echo "APP_PUBLIC_URL=${APP_URL}"
              echo "API_URL=${API_URL}"
            } > .env
            chmod 600 .env
            if [[ -n "${GHCR_TOKEN:-}" ]]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            ./deploy.sh "$APP_URL"
