name: Publish Docker image

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL do backend para build (ex. http://203.0.113.10:8090)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolver API_URL do build
        id: urls
        run: |
          API="${{ inputs.api_url || vars.API_URL || 'http://localhost:8090' }}"
          API="${API%/}"
          echo "api_url=${API}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Push imagem
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            API_URL=${{ steps.urls.outputs.api_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo
        run: |
          echo "Imagem: ${{ env.REGISTRY }}/${{ github.repository }}"
          echo "Tags: latest + SHA do commit"
          echo "API_URL (build arg): ${{ steps.urls.outputs.api_url }}"
