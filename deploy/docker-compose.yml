# Frontend Next.js — API Quarkus externa (não inclusa neste compose).
# Uso: cp .env.example .env && ./deploy.sh http://SEU_IP_OU_DOMINIO
services:
  frontend:
    image: ${GHCR_IMAGE}:${IMAGE_TAG:-latest}
    container_name: minhas-capivaras-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      API_URL: ${API_URL}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
